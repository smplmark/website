<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Benchmark — smplmark</title>
  <link rel="icon" href="/img/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="/img/favicon-32.png" sizes="32x32" type="image/png" />
  <link rel="apple-touch-icon" href="/img/apple-touch-icon.png" />
  <link rel="stylesheet" href="/vendor/uPlot.min.css" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <header class="site">
    <div class="wrap">
      <a class="brand" href="/"><picture>
        <source srcset="/img/logo-light.png" media="(prefers-color-scheme: light)" />
        <img src="/img/logo-dark.png" alt="smplmark" width="108" height="22" />
      </picture></a>
      <nav>
        <a href="/benchmarks">Benchmarks</a>
        <a href="/about">About</a>
        <a href="/api-reference">API Reference</a>
        <a href="/login">Sign in</a>
        <a href="/signup" class="nav-cta">Sign up</a>
      </nav>
    </div>
  </header>

  <main class="detail-page">
    <div class="wrap">
      <nav class="crumbs"><a id="crumb-back" href="/benchmarks">← All benchmarks</a></nav>
      <div class="detail-head">
        <h1 id="bm-name">Loading…</h1>
        <p class="tagline" id="bm-tagline"></p>
        <div class="chips" id="bm-chips"></div>
        <p class="byline" id="bm-byline"></p>
      </div>

      <!-- Server-side-rendered crawlable content (overview, metrics, targets, methodology). The
           Worker fills this for search engines; the viewer removes it once it has the live data
           (see benchmark.js). Empty when the SSR fetch was skipped or failed. -->
      <div class="prose" id="ssr-content"></div>

      <div id="banners"></div>

      <div id="tabs-wrap" hidden>
        <div class="tabs" role="tablist">
          <button class="tab active" data-tab="overview">Overview</button>
          <button class="tab" data-tab="data">Data</button>
          <button class="tab" data-tab="metrics">Metrics</button>
          <button class="tab" data-tab="methodology">Methodology</button>
          <button class="tab" data-tab="publisher">Publisher</button>
          <button class="tab" data-tab="stats">Stats</button>
        </div>

        <section class="tab-panel active" data-panel="overview">
          <div class="prose" id="overview-about"></div>
        </section>

        <section class="tab-panel" data-panel="data">
          <div class="data-layout">
            <aside class="target-rail" id="target-rail"></aside>
            <div class="data-main">
              <div class="controls">
                <div class="field" id="metric-field" hidden>
                  <label>Metrics</label>
                  <div class="dropdown" id="metric-dropdown"></div>
                </div>
                <div class="field" id="range-field">
                  <label for="range">Range</label>
                  <select id="range">
                    <option value="all">All time</option>
                    <option value="24h">Last 24 hours</option>
                    <option value="7d">Last 7 days</option>
                    <option value="30d">Last 30 days</option>
                  </select>
                </div>
                <div class="spacer"></div>
                <div class="links" id="chart-actions"></div>
              </div>
              <div class="chart-panel">
                <div id="chart"></div>
                <div id="empty" class="empty" hidden>No observations in this window.</div>
              </div>
              <div id="chart-status" class="status"></div>
            </div>
          </div>
        </section>

        <section class="tab-panel" data-panel="metrics">
          <div id="metrics-body"></div>
        </section>

        <section class="tab-panel" data-panel="methodology">
          <div class="prose" id="methodology-body"></div>
        </section>

        <section class="tab-panel" data-panel="publisher">
          <div class="publisher" id="publisher-body"></div>
        </section>

        <section class="tab-panel" data-panel="stats">
          <div id="stats-body"></div>
        </section>
      </div>

      <div id="load-status" class="status"></div>
    </div>
  </main>

  <footer class="site">
    <div class="wrap">
      <span class="footer-brand">© 2026 smplmark<sup>™</sup></span>
      <a href="/about">About</a>
      <a href="/benchmarks">Benchmarks</a>
      <a href="/sources">Sources</a>
      <a href="/terms">Terms</a>
      <a href="/privacy">Privacy</a>
      <a href="/api-reference">API</a>
      <a href="https://github.com/smplmark/website" class="gh"><svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/></svg>GitHub</a>
    </div>
  </footer>

  <script src="/vendor/uPlot.iife.min.js"></script>
  <script src="/js/benchmark.js"></script>
</body>
</html>
