<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Scheduler Latency — smplmark</title>
  <link rel="stylesheet" href="/vendor/uPlot.min.css" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <header class="site">
    <div class="wrap">
      <a class="brand" href="/">smpl<span>mark</span></a>
      <nav>
        <a href="/benchmarks">Benchmarks</a>
        <a href="/benchmarks/latency">Scheduler latency</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="wrap">
      <h2 class="section">Scheduler Latency — skew (ms)</h2>

      <div class="controls">
        <div class="field">
          <label for="target">Scheduler</label>
          <select id="target"><option value="">All schedulers</option></select>
        </div>
        <div class="field">
          <label for="from">From (UTC)</label>
          <input type="datetime-local" id="from" step="1" />
        </div>
        <div class="field">
          <label for="to">To (UTC)</label>
          <input type="datetime-local" id="to" step="1" />
        </div>
        <button class="btn primary" id="apply">Apply</button>
        <div class="spacer"></div>
        <div class="links">
          <button class="btn" id="csv">Download CSV</button>
          <a class="btn" id="json" href="#" target="_blank" rel="noopener">JSON</a>
        </div>
      </div>

      <div class="chart-panel">
        <div id="chart"></div>
        <div id="empty" class="empty" hidden>No samples in this window.</div>
      </div>
      <div id="status" class="status"></div>
    </div>
  </main>

  <footer class="site">
    <div class="wrap">
      <span>smplmark</span>
      <a href="/api/v1/benchmarks?filter[key]=scheduler-latency">API</a>
      <a href="https://github.com/smplmark/website">Source</a>
    </div>
  </footer>

  <script src="/vendor/uPlot.iife.min.js"></script>
  <script src="/js/latency.js"></script>
</body>
</html>
