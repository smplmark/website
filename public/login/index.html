<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in — smplmark</title>
  <meta name="description" content="Sign in to your smplmark publisher account." />
  <link rel="icon" href="/img/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="/img/favicon-32.png" sizes="32x32" type="image/png" />
  <link rel="apple-touch-icon" href="/img/apple-touch-icon.png" />
  <link rel="stylesheet" href="/css/app.css" />
  <link rel="stylesheet" href="/css/console.css" />
</head>
<body>
  <main class="authViewport">
    <section class="authCard">
      <div class="authCardHeader">
        <a class="authLogo" href="/" aria-label="smplmark home"><picture>
          <source srcset="/img/logo-light.png" media="(prefers-color-scheme: light)" />
          <img src="/img/logo-dark.png" alt="smplmark" />
        </picture></a>
      </div>

      <div class="authCopy">
        <h1>Sign in to smplmark</h1>
        <p>Manage your benchmarks and API keys.</p>
      </div>

      <div class="authSocials">
        <button type="button" id="oidc-google" class="button buttonSecondary authSocialButton">
          <svg aria-hidden="true" class="authSocialIcon" viewBox="0 0 24 24"><path d="M21.81 12.23c0-.72-.06-1.25-.19-1.8H12.2v3.56h5.53c-.11.88-.7 2.2-2 3.09l-.02.12 2.9 2.2.2.02c1.84-1.66 2.9-4.11 2.9-7.19Z" fill="#4285F4"/><path d="M12.2 21.9c2.71 0 4.99-.87 6.65-2.37l-3.17-2.34c-.85.58-1.99.99-3.48.99-2.65 0-4.89-1.71-5.69-4.08l-.12.01-3.02 2.29-.04.11A10.02 10.02 0 0 0 12.2 21.9Z" fill="#34A853"/><path d="M6.51 14.1A5.88 5.88 0 0 1 6.17 12c0-.73.13-1.44.33-2.1l-.01-.14-3.07-2.33-.1.05A9.76 9.76 0 0 0 2.2 12c0 1.57.38 3.06 1.12 4.35l3.19-2.25Z" fill="#FBBC05"/><path d="M12.2 5.82c1.88 0 3.15.79 3.87 1.45l2.82-2.68C17.18 3.02 14.9 2.1 12.2 2.1a10.02 10.02 0 0 0-8.88 5.49l3.18 2.42c.8-2.37 3.04-4.19 5.7-4.19Z" fill="#EA4335"/></svg>
          <span>Continue with Google</span>
        </button>
        <button type="button" id="oidc-microsoft" class="button buttonSecondary authSocialButton">
          <svg aria-hidden="true" class="authSocialIcon" viewBox="0 0 24 24"><path d="M3 3h8.5v8.5H3z" fill="#F25022"/><path d="M12.5 3H21v8.5h-8.5z" fill="#7FBA00"/><path d="M3 12.5h8.5V21H3z" fill="#00A4EF"/><path d="M12.5 12.5H21V21h-8.5z" fill="#FFB900"/></svg>
          <span>Continue with Microsoft</span>
        </button>
      </div>

      <div class="authDivider" aria-hidden="true"><span></span><span>or use email</span><span></span></div>

      <form class="authForm" id="login-form" novalidate>
        <label class="field"><span>Email</span>
          <input id="email" name="email" type="email" autocomplete="email" placeholder="you@example.com" required />
        </label>
        <label class="field"><span>Password</span>
          <div class="fieldInputWrap">
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Enter your password" required />
            <button type="button" class="fieldRevealToggle" data-reveal="password" tabindex="-1">Show</button>
          </div>
        </label>
        <button type="submit" class="button buttonPrimary authSubmit">Sign in</button>
      </form>

      <p id="form-error" class="form-status is-error" style="display:none;"></p>

      <p class="authFootnote">Don't have an account? <a class="authTextLink" href="/signup">Create one</a></p>
    </section>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/auth-pages.js"></script>
</body>
</html>
