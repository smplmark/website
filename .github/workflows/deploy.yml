name: Deploy

# Deploy the website Worker (www.smplmark.org + apex) on every push to main. Gated on typecheck + the
# test suite so a broken push never ships. No D1 here — the website is static + a routing shim; the
# database and API live in the app repo. Requires one repo secret: CLOUDFLARE_API_TOKEN (the account
# id is pinned in wrangler.jsonc).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    env:
      # wrangler reads this for auth; runs non-interactively because GitHub Actions sets CI=true.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # A deploy re-uploads the same version idempotently, so a bounded retry safely absorbs transient
      # Cloudflare API 5xx blips without risking partial state.
      - name: Deploy Worker
        run: |
          n=0
          until [ "$n" -ge 5 ]; do
            npx wrangler deploy && break
            n=$((n + 1))
            echo "::warning::deploy attempt $n failed (transient Cloudflare API error?); retrying in 20s"
            sleep 20
          done
          [ "$n" -lt 5 ]
