name: Deploy

# Deploy to production (www.smplmark.org) on every push to main. Gated on typecheck + the full test
# suite so a broken push never ships. Forward D1 migrations are applied before the Worker deploy so
# code and schema stay in sync. Requires one repo secret: CLOUDFLARE_API_TOKEN (the account id is
# pinned in wrangler.jsonc).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    env:
      # wrangler reads this for auth; runs non-interactively because GitHub Actions sets CI=true.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Apply D1 migrations (forward-only)
        run: npx wrangler d1 migrations apply smplmark --remote
      - name: Deploy Worker
        run: npx wrangler deploy
